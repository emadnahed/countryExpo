format_version: "13"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

app:
  envs:
    - GRADLEW_PATH: android/gradlew
    - ANDROID_AVD_NAME: Pixel_API_34

trigger_map:
  # Full E2E suite + EAS build — only on merges to main
  - push_branch: main
    workflow: e2e

  # Lightweight CI (lint + unit tests) — runs on any PR targeting main,
  # including hotfixes that bypass the normal staging→main flow.
  - pull_request_target_branch: main
    workflow: ci

workflows:

  # ── install ────────────────────────────────────────────────────────────────
  # Bare clone + dependency install shared by ci and e2e.
  # Lint and unit tests are NOT here so e2e does not repeat them after ci
  # already ran them as the PR gate.
  install:
    steps:
      - git-clone@8: {}

      - nvm@1:
          inputs:
            - node_version: "20"

      - script@1.2:
          title: Install dependencies
          inputs:
            - content: npm ci

  # ── ci ────────────────────────────────────────────────────────────────────
  # Runs on every staging→main PR: lint + unit tests only.
  ci:
    before_run:
      - install
    steps:
      - script@1.2:
          title: Lint
          inputs:
            - content: npm run lint

      - script@1.2:
          title: Unit tests
          inputs:
            - content: npm run test:ci

  # ── e2e ───────────────────────────────────────────────────────────────────
  # Runs on push to main: Detox E2E on Android emulator + EAS preview build.
  # Lint and unit tests are intentionally skipped here — they already passed
  # in the ci workflow that gated the merge.
  e2e:
    before_run:
      - install
    steps:
      - script@1.2:
          title: Expo prebuild (Android)
          inputs:
            - content: npx expo prebuild --platform android --clean

      - avd-manager@2:
          inputs:
            - profile: pixel
            - api_level: "34"
            - tag: google_apis
            - abi: x86_64
            - create_command_flags: "--sdcard 512M"
            - start_command_flags: "-no-window -gpu swiftshader_indirect -noaudio -no-boot-anim"

      - wait-for-android-emulator@1: {}

      - script@1.2:
          title: Build Android debug APKs (app + test)
          inputs:
            - content: npx detox build --configuration android.ci.debug

      - script@1.2:
          title: Run Detox E2E (attached emulator)
          inputs:
            - content: npm run e2e:android:ci

      - script@1.2:
          title: Trigger EAS Build (preview — APK + IPA)
          inputs:
            - content: |
                npx eas-cli build \
                  --profile preview \
                  --platform all \
                  --non-interactive \
                  --no-wait