format_version: "13"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

trigger_map:
  # Full E2E suite + EAS build — only on merges to main
  - push_branch: main
    workflow: e2e

  # Lightweight CI (lint + unit tests) — runs on any PR targeting main,
  # including hotfixes that bypass the normal staging→main flow.
  - pull_request_target_branch: main
    workflow: ci

workflows:

  # ── install ────────────────────────────────────────────────────────────────
  # Bare clone + dependency install shared by ci and e2e.
  # Lint and unit tests are NOT here so e2e does not repeat them after ci
  # already ran them as the PR gate.
  install:
    steps:
      - git-clone@8: {}

      - nvm@1:
          inputs:
            - node_version: "20"

      - restore-npm-package-manager-cache@1: {}

      - script@1.2:
          title: Install dependencies
          inputs:
            - content: npm ci

      - save-npm-package-manager-cache@1: {}


  # ── ci ────────────────────────────────────────────────────────────────────
  # Runs on any PR targeting main: lint + unit tests only.
  ci:
    before_run:
      - install
    steps:
      - script@1.2:
          title: Lint
          inputs:
            - content: npm run lint

      - script@1.2:
          title: Unit tests
          inputs:
            - content: npm run test:ci

  # ── e2e ───────────────────────────────────────────────────────────────────
  # Runs on push to main: Detox E2E on iOS simulator + EAS preview build.
  # Android E2E is run locally — emulators are not supported on Apple Silicon.
  # Lint and unit tests are intentionally skipped here — they already passed
  # in the ci workflow that gated the merge.
  e2e:
    before_run:
      - install
    steps:
      - script@1.2:
          title: Expo prebuild (iOS)
          inputs:
            - content: npm run ios:prebuild

      - script@1.2:
          title: Build iOS app for Detox
          inputs:
            - content: npm run e2e:build

      - script@1.2:
          title: Run Detox E2E (iOS simulator)
          inputs:
            - content: npm run e2e:test:ci

      - script@1.2:
          title: Trigger EAS Build (preview — APK + IPA)
          inputs:
            - content: |
                npx eas-cli build \
                  --profile preview \
                  --platform all \
                  --non-interactive \
                  --no-wait